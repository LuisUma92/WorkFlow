<!-- myapp/templates/myapp/display_content.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Model Row Display</title>
</head>
<body>
    {% if error %}
    <div style="color: red;">
        <p>{{ error }}</p>
    </div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <table>
            {% for key, value in data.items %}
                <tr>
                    <td><label for="{{ key }}">{{ key }}:</label></td>
                    <td><input type="text" id="{{ key }}" name="{{ key }}" value="{{ value }}"></td>
                </tr>
            {% endfor %}
        </table>
        <button type="submit">Submit</button>
    </form>
</body>
</html>

# Deploy project wiki and ADR documentation to GitHub Pages
# Serves docs/wiki/ and docs/ADR/ as static Markdown via GitHub Pages

name: Deploy Documentation

on:
  push:
    branches: ["master"]
    paths:
      - "docs/**"
      - "README.md"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs/"

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

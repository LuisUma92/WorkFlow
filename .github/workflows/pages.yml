# Deploy project wiki and ADR documentation to GitHub Pages
# Serves docs/wiki/ and docs/ADR/ as static Markdown via GitHub Pages

name: Deploy Documentation

on:
  push:
    branches: ["master"]
    paths:
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: "docs/"
          destination: "./_site"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build API docs with pdoc
        # numpy/networkx are optional imports of latexzettel.api.analysis and
        # graph clustering; pdoc imports every module, so they must be present.
        # PRISMAreview is excluded: Django app, needs settings + MariaDB to import.
        run: |
          pip install -e . pdoc numpy networkx
          pdoc workflow itep latexzettel lectkit appfunc -o ./pdoc_out

      - name: Merge API docs into site
        # jekyll-build-pages runs in Docker; _site is root-owned.
        run: sudo mv ./pdoc_out ./_site/api

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./_site"

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

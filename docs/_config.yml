title: WorkFlow
description: Python CLI toolkit for LaTeX projects and a unified Zettelkasten knowledge system.
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme

search_enabled: true
heading_anchors: true
aux_links:
  GitHub: https://github.com/LuisUma92/WorkFlow

# pdoc output is merged into _site/api/ by the Pages workflow (outside Jekyll).
# just-the-docs pipes this url through `relative_url`, which prepends the
# baseurl (/WorkFlow) injected by configure-pages — so no prefix here.
nav_external_links:
  - title: API reference (pdoc)
    url: /api/
    hide_icon: true

exclude:
  - temp.md
  - superpowers/
  - .obsidian/
